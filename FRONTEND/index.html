<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas Saludables - Cuidamos a tu mascota</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="flashMessages" class="flash-messages"></div>

    <header>
        <nav class="navbar">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;"> <img src="img/Logo_Huellitas_Saludables.png" alt="" width="40"> HUELLITAS SALUDABLES </div>
            <ul class="menu" id="menuNav">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#servicios" onclick="showSection('servicios')">Servicios</a></li>
                <li><a href="#" onclick="checkAuthAndRedirect('citas')">Citas Veterinarias</a></li>
                <li><a href="#" onclick="checkAuthAndRedirect('cuidadores')">Cuidadores</a></li>
                <li><a href="#" onclick="checkAuthAndRedirect('mascotas')">Mis Mascotas</a></li>
                <li><a href="#contacto" onclick="showSection('contacto')">Contacto</a></li>
                <li id="authButtons"></li>
            </ul>
        </nav>
    </header>

    <main id="mainContent"></main>

    <footer>
        <p>© 2026 Huellitas Saludables - Todos los derechos reservados.</p>
        <p style="margin-top: 10px; font-size: 14px;">❤️ Cuidando a quienes más amas</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        let currentUser = null;

        function showFlash(message, type = 'success') {
            const container = document.getElementById('flashMessages');
            const flash = document.createElement('div');
            flash.className = `flash-message flash-${type}`;
            flash.innerHTML = message;
            container.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 3000);
        }

        function updateAuthButtons() {
            const authContainer = document.getElementById('authButtons');
            if (currentUser) {
                authContainer.innerHTML = `
                    <li><a href="#" style="color:#4CAF50;">👤 ${currentUser.name}</a></li>
                    <li><a href="#" onclick="cerrarSesion()" class="btn-menu">Cerrar Sesión</a></li>
                `;
            } else {
                authContainer.innerHTML = `
                    <li><a href="login.html">Iniciar Sesión</a></li>
                    <li><a href="registro.html" class="btn-menu">Registrarse</a></li>
                `;
            }
        }

        async function verificarSesion() {
            const result = await checkSession();
            if (result.isLoggedIn) {
                currentUser = result.user;
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', result.user.email);
                localStorage.setItem('userName', result.user.name);
            } else {
                currentUser = null;
                localStorage.setItem('userLoggedIn', 'false');
            }
            updateAuthButtons();
        }

        async function cerrarSesion() {
            const result = await logout();
            if (result.success) {
                currentUser = null;
                localStorage.setItem('userLoggedIn', 'false');
                updateAuthButtons();
                showFlash(result.message, 'success');
                showSection('inicio');
            } else {
                showFlash(result.message, 'error');
            }
        }

        function checkAuthAndRedirect(section) {
            if (currentUser) {
                window.location.href = `index.html?section=${section}`;
            } else {
                showFlash('⚠️ Debes iniciar sesión para acceder a esta sección', 'warning');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }
        }

        async function showSection(section) {
            const main = document.getElementById('mainContent');
            if (section === 'inicio' || !section) {
                main.innerHTML = `
                    <section class="hero">
                        <div class="hero-text">
                            <h1>Bienvenido a Huellitas Saludables:<br>cuidamos a tu mascota cuando más lo necesita.</h1>
                            <p>Plataforma especializada en salud, bienestar y seguimiento integral para sus mascotas.</p>
                            <div class="hero-buttons">
                                <button class="btn" onclick="checkAuthAndRedirect('citas')">📅 Agendar Cita</button>
                                <button class="btn btn-secundario" onclick="checkAuthAndRedirect('cuidadores')">🏠 Solicitar Cuidador</button>
                            </div>
                        </div>
                        <div class="hero-img">
                            <img src="img/HueLLitas-Saludables.jpg" alt="Mascotas felices">
                        </div>
                    </section>
                    <section class="servicios" id="servicios">
                        <h2>Nuestros Servicios</h2>
                        <div id="serviciosList" class="cards"></div>
                    </section>
                    <section class="funciona">
                        <h2>¿Cómo funciona?</h2>
                        <div class="pasos">
                            <div class="paso"><span>1</span><p>Registra tu cuenta</p></div>
                            <div class="paso"><span>2</span><p>Registra tu mascota</p></div>
                            <div class="paso"><span>3</span><p>Agenda una cita</p></div>
                            <div class="paso"><span>4</span><p>Recibe seguimiento</p></div>
                        </div>
                    </section>
                    <section id="contacto" style="padding: 4rem 5%; text-align: center;">
                        <h2>📧 Contáctanos</h2>
                        <div style="max-width: 500px; margin: 2rem auto;">
                            <input type="text" id="contactoNombre" placeholder="Nombre completo" style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:5px;">
                            <input type="email" id="contactoEmail" placeholder="Correo electrónico" style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:5px;">
                            <textarea id="contactoMensaje" placeholder="Escribe tu mensaje..." style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:5px; min-height:100px;"></textarea>
                            <button onclick="enviarContactoFormulario()" class="btn">Enviar Mensaje</button>
                        </div>
                    </section>
                `;
                cargarServicios();
            } else if (section === 'servicios') {
                main.innerHTML = `<section class="servicios" style="padding-top:6rem"><h2>Nuestros Servicios</h2><div id="serviciosList" class="cards"></div></section>`;
                cargarServicios();
            } else if (section === 'citas') {
                await mostrarCitas();
            } else if (section === 'cuidadores') {
                await mostrarCuidadores();
            } else if (section === 'mascotas') {
                await mostrarMascotas();
            } else if (section === 'contacto') {
                main.innerHTML = `
                    <div class="form-container">
                        <div class="formulario">
                            <h2>📧 Contáctanos</h2>
                            <input type="text" id="contactoNombre2" placeholder="Nombre completo">
                            <input type="email" id="contactoEmail2" placeholder="Correo electrónico">
                            <textarea id="contactoMensaje2" placeholder="Escribe tu mensaje..."></textarea>
                            <button onclick="enviarContactoFormulario2()">Enviar Mensaje</button>
                        </div>
                    </div>
                `;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function cargarServicios() {
            const result = await getServicios();
            if (result.success && document.getElementById('serviciosList')) {
                document.getElementById('serviciosList').innerHTML = result.servicios.map(s => `
                    <div class="card">
                        <i class="fa-solid ${s.icono}"></i>
                        <h3>${s.titulo}</h3>
                        <p>${s.descripcion}</p>
                    </div>
                `).join('');
            }
        }

        async function mostrarCitas() {
            const citasResult = await getCitas();
            document.getElementById('mainContent').innerHTML = `
                <div class="form-container" style="flex-direction:column">
                    <div class="formulario"><h2>📅 Agendar Nueva Cita</h2>
                        <input type="text" id="citaMascota" placeholder="Nombre de la mascota">
                        <input type="date" id="citaFecha"><input type="time" id="citaHora">
                        <textarea id="citaMotivo" placeholder="Motivo de la cita"></textarea>
                        <button onclick="agendarCita()">Agendar Cita</button>
                    </div>
                    <div class="tabla-container"><h3>📋 Mis Citas</h3><table class="tabla"><thead><tr><th>Mascota</th><th>Fecha</th><th>Hora</th><th>Motivo</th><th>Estado</th></tr></thead><tbody id="citasLista"></tbody></table></div>
                </div>
            `;
            if (citasResult.success && citasResult.citas) {
                document.getElementById('citasLista').innerHTML = citasResult.citas.map(c => `
                    <tr><td>${c.mascota}</td><td>${c.fecha}</td><td>${c.hora}</td><td>${c.motivo}</td><td>${c.estado}</td></tr>
                `).join('');
            }
        }

        async function agendarCita() {
            const result = await crearCita({
                mascota: document.getElementById('citaMascota').value,
                fecha: document.getElementById('citaFecha').value,
                hora: document.getElementById('citaHora').value,
                motivo: document.getElementById('citaMotivo').value
            });
            showFlash(result.message, result.success ? 'success' : 'error');
            if (result.success) mostrarCitas();
        }

        async function mostrarCuidadores() {
            const result = await getCuidadores();
            document.getElementById('mainContent').innerHTML = `
                <div class="form-container" style="flex-direction:column"><h2>🐕 Cuidadores Disponibles</h2>
                <div id="cuidadoresList" class="cuidadores-grid"></div></div>
            `;
            if (result.success) {
                document.getElementById('cuidadoresList').innerHTML = result.cuidadores.map(c => `
                    <div class="cuidador-card"><h3>${c.nombre}</h3><p>📍 ${c.ciudad}</p><p>⭐ ${c.calificacion} ★</p><p>📅 ${c.experiencia}</p><p>📞 ${c.telefono}</p><p class="${c.disponible ? 'disponible' : 'no-disponible'}">${c.disponible ? '✅ Disponible' : '❌ No disponible'}</p></div>
                `).join('');
            }
        }

        async function mostrarMascotas() {
            const result = await getMascotas();
            document.getElementById('mainContent').innerHTML = `
                <div class="form-container" style="flex-direction:column">
                    <div class="formulario"><h2>🐾 Registrar Mascota</h2>
                        <input type="text" id="mascotaNombre" placeholder="Nombre">
                        <select id="mascotaEspecie"><option value="Perro">Perro</option><option value="Gato">Gato</option></select>
                        <input type="text" id="mascotaRaza" placeholder="Raza">
                        <input type="number" id="mascotaEdad" placeholder="Edad">
                        <input type="number" id="mascotaPeso" placeholder="Peso (kg)">
                        <button onclick="registrarMascota()">Registrar Mascota</button>
                    </div>
                    <div class="tabla-container"><h3>📋 Mis Mascotas</h3><table class="tabla"><thead><tr><th>Nombre</th><th>Especie</th><th>Raza</th><th>Edad</th><th>Peso</th></tr></thead><tbody id="mascotasLista"></tbody></table></div>
                </div>
            `;
            if (result.success) {
                document.getElementById('mascotasLista').innerHTML = result.mascotas.map(m => `
                    <tr><td>${m.nombre}</td><td>${m.especie}</td><td>${m.raza}</td><td>${m.edad} años</td><td>${m.peso || '-'} kg</td></tr>
                `).join('');
            }
        }

        async function registrarMascota() {
            const result = await crearMascota({
                nombre: document.getElementById('mascotaNombre').value,
                especie: document.getElementById('mascotaEspecie').value,
                raza: document.getElementById('mascotaRaza').value,
                edad: parseInt(document.getElementById('mascotaEdad').value),
                peso: parseFloat(document.getElementById('mascotaPeso').value) || null
            });
            showFlash(result.message, result.success ? 'success' : 'error');
            if (result.success) mostrarMascotas();
        }

        async function enviarContactoFormulario() {
            const datos = {
                nombre: document.getElementById('contactoNombre')?.value,
                email: document.getElementById('contactoEmail')?.value,
                mensaje: document.getElementById('contactoMensaje')?.value
            };
            const result = await enviarMensajeContacto(datos);
            showFlash(result.message, result.success ? 'success' : 'error');
            if (result.success) {
                if(document.getElementById('contactoNombre')) document.getElementById('contactoNombre').value = '';
                if(document.getElementById('contactoEmail')) document.getElementById('contactoEmail').value = '';
                if(document.getElementById('contactoMensaje')) document.getElementById('contactoMensaje').value = '';
            }
        }

        async function enviarContactoFormulario2() {
            const datos = {
                nombre: document.getElementById('contactoNombre2')?.value,
                email: document.getElementById('contactoEmail2')?.value,
                mensaje: document.getElementById('contactoMensaje2')?.value
            };
            const result = await enviarMensajeContacto(datos);
            showFlash(result.message, result.success ? 'success' : 'error');
            if (result.success) showSection('inicio');
        }

        // Inicializar
        verificarSesion();
        const urlParams = new URLSearchParams(window.location.search);
        const section = urlParams.get('section');
        showSection(section || 'inicio');
    </script>
</body>
</html>
